     <script>


        let selectedDate = null;
        let calendar = null;
        let citasAgendadas = [];

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            
            // Cargar citas existentes del localStorage
            const citasGuardadas = localStorage.getItem('citasWorldSchool');
            if (citasGuardadas) {
                citasAgendadas = JSON.parse(citasGuardadas);
            }
            
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                headerToolbar: false,
                selectable: true,
                firstDay: 1,
                dateClick: function(info) {
                    showTimeSlots(info.dateStr);
                },
                events: citasAgendadas // Cargar citas existentes
            });
            
            calendar.render();
            updateCurrentMonth();

            // Event listeners
            document.getElementById('prevMonth').addEventListener('click', () => { 
                calendar.prev(); 
                updateCurrentMonth(); 
            });
            
            document.getElementById('nextMonth').addEventListener('click', () => { 
                calendar.next(); 
                updateCurrentMonth(); 
            });
            
            document.getElementById('closeModal').addEventListener('click', () => { 
                document.getElementById('confirmModal').style.display = 'none';
                document.getElementById('timeSlotsSection').style.display = 'none';
            });
            
            document.getElementById('newAppointment').addEventListener('click', () => {
                document.getElementById('confirmModal').style.display = 'none';
                document.getElementById('timeSlotsSection').style.display = 'none';
                // Ocultar slots seleccionados previamente
                document.querySelectorAll('.time-slot.selected').forEach(slot => {
                    slot.classList.remove('selected');
                });
            });
        });

        function updateCurrentMonth() {
            const date = calendar.getDate();
            const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            document.getElementById('currentMonth').textContent = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
        }

function showTimeSlots(dateStr) {
    selectedDate = dateStr;
    const section = document.getElementById('timeSlotsSection');
    const grid = document.getElementById('timeSlots');
    const dateObj = new Date(dateStr + 'T00:00:00');
    
    // Formatear fecha para mostrar
    const fechaFormateada = dateObj.toLocaleDateString('es-ES', { 
        weekday: 'long', 
        day: 'numeric', 
        month: 'long',
        year: 'numeric'
    });
    
    // Capitalizar primera letra
    document.getElementById('fechaTexto').textContent = fechaFormateada.charAt(0).toUpperCase() + fechaFormateada.slice(1);
    
    grid.innerHTML = '';
    section.style.display = 'block';

    // Definir franjas horarias
    const franjasHorarias = [
        { nombre: 'Mañana', inicio: 8, fin: 12, intervalo: 30 },
        { nombre: 'Tarde', inicio: 12, fin: 17, intervalo: 30 },
        { nombre: 'Noche', inicio: 17, fin: 21, intervalo: 30 }
    ];

    // Crear selector por franjas
    franjasHorarias.forEach(franja => {
        const franjaContainer = document.createElement('div');
        franjaContainer.className = 'franja-horaria';
        
        const franjaHeader = document.createElement('div');
        franjaHeader.className = 'franja-header';
        franjaHeader.innerHTML = `<h5><i class="fas fa-sun"></i> ${franja.nombre} (${franja.inicio}:00 - ${franja.fin}:00)</h5>`;
        
        const franjaGrid = document.createElement('div');
        franjaGrid.className = 'franja-grid';
        
        // Generar horas para esta franja
        for (let h = franja.inicio; h < franja.fin; h++) {
            for (let m = 0; m < 60; m += franja.intervalo) {
                const time = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                const fullDateTime = `${dateStr}T${time}:00`;
                
                const btn = document.createElement('button');
                btn.className = 'time-slot';
                btn.innerHTML = time;
                
                // Verificar si esta hora ya está agendada
                const yaAgendada = citasAgendadas.some(cita => cita.start === fullDateTime);
                
                if (yaAgendada) {
                    btn.classList.add('ocupado');
                    btn.title = 'Horario ocupado';
                    btn.disabled = true;
                    btn.innerHTML = `
                        <span class="time-text">${time}</span>
                        <i class="fas fa-lock"></i>
                    `;
                } else {
                    btn.onclick = () => agendarDirecto(dateStr, time, btn);
                    btn.innerHTML = `
                        <span class="time-text">${time}</span>
                        <i class="fas fa-calendar-plus"></i>
                    `;
                }
                
                franjaGrid.appendChild(btn);
            }
        }
        
        franjaContainer.appendChild(franjaHeader);
        franjaContainer.appendChild(franjaGrid);
        grid.appendChild(franjaContainer);
    });

    // También agregar un filtro rápido de horas
    const filterContainer = document.createElement('div');
    filterContainer.className = 'filtro-horas';
    filterContainer.innerHTML = `
        <div class="filtro-header">
            <h6><i class="fas fa-filter"></i> Filtrar por disponibilidad:</h6>
        </div>
        <div class="filtro-botones">
            <button class="filtro-btn active" data-filtro="todas">Todas las horas</button>
            <button class="filtro-btn" data-filtro="disponibles">Solo disponibles</button>
            <button class="filtro-btn" data-filtro="ocupadas">Solo ocupadas</button>
        </div>
    `;
    grid.parentNode.insertBefore(filterContainer, grid);
    
    // Añadir funcionalidad de filtro
    document.querySelectorAll('.filtro-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const filtro = this.dataset.filtro;
            
            // Actualizar botones activos
            document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            // Aplicar filtro
            document.querySelectorAll('.time-slot').forEach(slot => {
                switch(filtro) {
                    case 'disponibles':
                        slot.style.display = slot.classList.contains('ocupado') ? 'none' : '';
                        break;
                    case 'ocupadas':
                        slot.style.display = slot.classList.contains('ocupado') ? '' : 'none';
                        break;
                    default:
                        slot.style.display = '';
                }
            });
        });
    });
    
    // Scroll suave hacia los horarios
    section.scrollIntoView({ behavior: 'smooth' });
}

function agendarDirecto(date, time, buttonElement) {
    const fullDateTime = `${date}T${time}:00`;
    
    // 1. Marcar visualmente el botón como seleccionado
    buttonElement.classList.add('selected');
    buttonElement.innerHTML = `
        <span class="time-text">${time}</span>
        <i class="fas fa-check-circle"></i>
    `;
    
    // 2. Crear objeto de cita con mejor visibilidad
    const nuevaCita = {
        id: `cita_${Date.now()}`,
        title: '📚 CLASE',
        start: fullDateTime,
        backgroundColor: '#a8a054',
        borderColor: '#8c8844',
        textColor: 'white',
        classNames: ['cita-destacada'],
        extendedProps: {
            fecha: date,
            hora: time,
            estado: 'confirmada'
        }
    };
    
    // 3. Agregar al calendario
    calendar.addEvent(nuevaCita);
    
    // 4. Guardar en array y localStorage
    citasAgendadas.push(nuevaCita);
    localStorage.setItem('citasWorldSchool', JSON.stringify(citasAgendadas));
    
    // 5. Mostrar Modal de confirmación con mejor información
    const fechaObj = new Date(date + 'T00:00:00');
    const fechaFormateada = fechaObj.toLocaleDateString('es-ES', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
    });
    
    document.getElementById('modalFecha').textContent = fechaFormateada.charAt(0).toUpperCase() + fechaFormateada.slice(1);
    document.getElementById('modalHora').textContent = time;
    document.getElementById('confirmModal').style.display = 'flex';
    
    // 6. Actualizar visualmente todos los botones ocupados
    setTimeout(() => {
        document.querySelectorAll('.time-slot').forEach(slot => {
            if (slot !== buttonElement && !slot.classList.contains('ocupado')) {
                slot.disabled = false;
                slot.style.pointerEvents = 'auto';
            }
        });
    }, 2000);
}
